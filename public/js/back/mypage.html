<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // Tailwind configuration
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-500': '#3b82f6', 
                        'danger-500': '#ef4444', 
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <script src="mypage.js" defer></script> 

    <style>
        /* 기본 스타일을 위한 사용자 정의 CSS 및 Tailwind 클래스 매핑 */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
        }
        .mypage-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 1rem; /* rounded-xl */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* shadow-xl */
        }
        .card-style {
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            background-color: #f9fafb; /* gray-50 */
            border-radius: 0.75rem; /* rounded-lg */
            border: 1px solid #e5e7eb; /* border-gray-200 */
        }
        .action-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 600; /* font-semibold */
            border-radius: 0.5rem; /* rounded-lg */
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .primary-action {
            background-color: #3b82f6; /* primary-500 */
            color: white;
        }
        .primary-action:hover {
            background-color: #2563eb; /* blue-600 */
        }
        .danger-action {
            background-color: #ef4444; /* danger-500 */
            color: white;
        }
        .danger-action:hover {
            background-color: #dc2626; /* red-600 */
        }
        .back-to-main-btn {
            background-color: #6b7280; /* gray-500 */
            color: white;
        }
        .back-to-main-btn:hover {
            background-color: #4b5563; /* gray-600 */
        }
        .small-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem; /* text-sm */
            border-radius: 0.5rem; /* rounded-lg */
            background-color: #d1d5db; /* gray-300 */
            color: #1f2937; /* gray-800 */
            transition: background-color 0.2s;
        }
        .small-btn:hover {
            background-color: #9ca3af; /* gray-400 */
        }
        /* 지출 그래프 섹션을 위한 추가 스타일 */
        .chart-container-style {
            max-width: 300px; /* 차트 크기 제한 */
            margin: 0 auto 1.5rem;
        }
    </style>
</head>
<body>
    <div class="mypage-container">
        <h2 class="text-3xl font-bold mb-6 text-gray-800">마이페이지</h2>

        <section class="user-profile-section card-style">
            <h3 class="text-xl font-semibold mb-4 text-gray-700">회원 정보</h3>
            <div class="space-y-4">
                <div>
                    <label for="profile-username" class="block text-sm font-medium text-gray-700">아이디</label>
                    <input type="text" id="profile-username" value="로딩 중..." readonly 
                            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-3 bg-gray-100 text-gray-600 cursor-not-allowed">
                </div>
                <div>
                    <label for="profile-email" class="block text-sm font-medium text-gray-700">이메일</label>
                    <input type="email" id="profile-email" value="로딩 중..." readonly 
                            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-3 bg-gray-100 text-gray-600 cursor-not-allowed">
                </div>
                <div>
                    <label for="profile-birth-year" class="block text-sm font-medium text-gray-700">출생 연도</label>
                    <input type="text" id="profile-birth-year" value="로딩 중..." readonly 
                            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-3 bg-gray-100 text-gray-600 cursor-not-allowed">
                </div>
            </div>
        </section>
        
        <section class="budget-goal-section card-style">
            <h3 class="text-xl font-semibold mb-3 text-gray-700">나의 예산</h3>
            <div id="goal-display" class="flex justify-between items-center">
                <p id="goal-text" class="text-lg">총 예산: <strong class="text-primary-500">로딩 중...</strong></p> 
            </div>
        </section>

        <section class="monthly-spending-section card-style">
            <h3 class="text-xl font-semibold mb-3 text-gray-700">월간 지출 현황 분석</h3>
            
            <div id="user-age-group-info" class="text-center mb-6">
                <p class="text-gray-500 mb-4">
                    현재 나의 지출 카테고리 분포입니다.
                </p>
                <div class="chart-container-style">
                    <canvas id="age-analysis-chart"></canvas>
                </div>
            </div>

            <h4 class="text-lg font-semibold mb-3 text-gray-700 border-t pt-3">🏆 지출이 가장 큰 카테고리 (TOP 5)</h4>
            <ul id="top-category-list" class="space-y-2">
                <li class="text-gray-500">데이터를 로드하는 중...</li>
            </ul>

        </section>

        <section class="transaction-history-section card-style">
            <h3 class="text-xl font-semibold mb-3 text-gray-700">최근 거래 내역</h3>
            <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
                <table class="min-w-full text-sm text-left text-gray-700 divide-y divide-gray-200">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                        <tr>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium">날짜</th>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium">분류</th>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium">내용</th>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium text-right">금액</th>
                        </tr>
                    </thead>
                    <tbody id="recent-transactions-body" class="divide-y divide-gray-200 bg-white">
                        <tr class="hover:bg-gray-50">
                            <td colspan="4" class="px-4 sm:px-6 py-4 whitespace-nowrap text-center text-gray-500">데이터를 로드하는 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="password-change-section" class="card-style hidden">
            <h3 class="text-xl font-semibold mb-4 text-gray-700">비밀번호 변경</h3>
            <form id="password-change-form" class="space-y-4">
                <div>
                    <label for="current-password" class="block text-sm font-medium text-gray-700">현재 비밀번호</label>
                    <input type="password" id="current-password" required
                           class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-3 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <div>
                    <label for="new-password" class="block text-sm font-medium text-gray-700">새 비밀번호</label>
                    <input type="password" id="new-password" required
                           class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-3 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <button type="submit" class="action-btn primary-action">
                    비밀번호 변경 완료
                </button>
                <button type="button" class="action-btn back-to-main-btn" onclick="togglePasswordSection()">
                    취소
                </button>
            </form>
        </section>
        
        <section id="toggle-button-section" class="action-section">
            <button id="password-toggle-btn" class="action-btn primary-action" onclick="togglePasswordSection()">
                비밀번호 변경
            </button>
        </section>
        
        <section class="action-section">
            <button id="main-back-btn" class="action-btn back-to-main-btn"> 
                메인으로 돌아가기
            </button>
        </section>
    </div>
</body>
</html>
