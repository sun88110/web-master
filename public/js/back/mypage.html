<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind configuration for custom styles and font
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-500': '#3b82f6', // blue-500
                        'danger-500': '#ef4444', // red-500
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .mypage-container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .card-style { background-color: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); padding: 20px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
        .small-btn { padding: 8px 16px; font-size: 0.875rem; border-radius: 4px; background-color: #f3f4f6; color: #1f2937; transition: background-color 0.15s; }
        .small-btn:hover { background-color: #e5e7eb; }
        .action-btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: 600; margin-top: 10px; transition: background-color 0.15s; }
        .primary-action { background-color: #3b82f6; color: white; }
        .primary-action:hover { background-color: #2563eb; }
        .danger-action { background-color: #ef4444; color: white; }
        .danger-action:hover { background-color: #dc2626; }
        .back-to-main-btn { background-color: #6b7280; color: white; }
        .back-to-main-btn:hover { background-color: #4b5563; }
    </style>
</head>
<body>
    <div class="mypage-container">
        <h2 class="text-3xl font-bold mb-6 text-gray-800">마이페이지</h2>

        <section class="budget-goal-section card-style">
            <h3 class="text-xl font-semibold mb-3 text-gray-700">나의 목표 예산</h3>
            <div id="goal-display" class="flex justify-between items-center">
                <p class="text-lg">현재 목표: <strong class="text-primary-500">로딩 중...</strong></p>
                <button class="small-btn" onclick="handleGoalEdit()">수정</button>
            </div>
        </section>

        <section class="monthly-spending-section card-style">
            <h3 class="text-xl font-semibold mb-3 text-gray-700">월간 지출 현황 (그래프)</h3>
            <div class="chart-area h-48 bg-gray-50 flex items-center justify-center border border-gray-200 rounded-md">
                <p class="text-gray-500">이번 달 지출 현황 그래프 (구현 예정)</p>
            </div>
        </section>

        <section class="transaction-history-section card-style">
            <h3 class="text-xl font-semibold mb-3 text-gray-700">최근 거래 내역</h3>
            <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
                <table class="min-w-full text-sm text-left text-gray-700 divide-y divide-gray-200">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                        <tr>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium">날짜</th>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium">분류</th>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium">내용</th>
                            <th scope="col" class="px-4 sm:px-6 py-3 font-medium text-right">금액</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 bg-white">
                        <tr class="hover:bg-gray-50">
                            <td colspan="4" class="px-4 sm:px-6 py-4 whitespace-nowrap text-center text-gray-500">데이터를 로드하는 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 text-center">
                <button class="small-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 transition duration-150" onclick="handleViewAllTransactions()">
                    전체 내역 보기
                </button>
            </div>
        </section>

        <section class="action-section">
            <button class="action-btn primary-action" onclick="handlePasswordChange()">
                비밀번호 변경
            </button>
        </section>

        <section class="action-section mb-6">
            <button class="action-btn danger-action" onclick="handleDeleteHistory()">
                거래 내역 삭제 / 초기화
            </button>
        </section>
        
        <section class="action-section">
            <button class="action-btn back-to-main-btn" onclick="location.href='main.html'"> 
                메인으로 돌아가기
            </button>
        </section>
    </div>

    <script src="mypage.js"></script>
</body>
</html>
