<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가계부 - 메인</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="main.css"> 
</head>
<body>
    <div class="layout-container">

        <aside class="sidebar left">
            <h3>📌 예산 설정</h3>
            <form id="budget-form">
                <input type="month" id="budget-month" required />
                
                <div class="select-wrapper">
                    <select id="budget-category">
                        <option value="" selected>전체 예산 (선택 사항)</option>
                        </select>
                </div>
                
                <input type="number" id="budget-amount-input" placeholder="금액 입력 (예: 500,000)" required />
                <button type="submit">등록</button>
            </form>
            
            <div id="budget-display">
                <h4>나의 월간 잔액 현황</h4>
                <p>총 가용 잔액: <strong id="total-budget">0원</strong></p> 
            </div>
            
            <button id="mypage-btn" class="mypage-btn">마이페이지</button>
            <button class="logout-btn">로그아웃</button>
        </aside>

        <main class="main-content">
            <h2 id="user-welcome-message">💸 나의 가계부</h2>

            <section class="add-transaction">
                <h3>📥 거래 추가</h3>
                <form id="transaction-form">
                    <div class="transaction-type-radio">
                        <input type="radio" id="type-expense" name="transaction-type" value="지출" checked>
                        <label for="type-expense">지출</label>
                        <input type="radio" id="type-income" name="transaction-type" value="수입">
                        <label for="type-income">수입</label>
                    </div>

                    <div class="select-wrapper"> 
                        <select id="category-select" required> 
                            <option value="" disabled selected>카테고리 선택</option> 
                        </select> 
                    </div> 

                    <input type="text" id="description" placeholder="항목 (예: 커피, 월급)" required /> 
                    <input type="number" id="amount-input" placeholder="금액 (예: 4000, 500000)" min="1" required /> 
                    <input type="date" id="date" required /> 
                    <button type="submit">등록</button> 
                </form> 
            </section>

            <section class="transaction-list">
                <div class="list-header">
                    <h3>📃 최근 거래 내역</h3>
                    <button class="view-all-btn" onclick="alert('전체 내역 조회 기능은 구현되지 않았습니다.')">전체 내역 조회</button>
                </div>
                <ul id="transactions">
                    </ul>
            </section>
        </main>

        <aside class="sidebar right analysis-area"> 
            <h3>📊 내 연령대 지출 분석</h3> 
            <div id="user-age-group-info">
                <p><strong>나의 재정 현황 및 연령대 지출 비교</strong></p>
                <canvas id="age-analysis-chart"></canvas> 
            </div>

            <h4>🏆 지출이 가장 큰 카테고리 (TOP 5)</h4>
            <ul id="top-category-list">
                </ul>
        </aside> 

    </div>

    <script src="main.js"></script>

</body>
</html>
